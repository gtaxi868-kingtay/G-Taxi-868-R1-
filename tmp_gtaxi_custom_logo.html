<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Taxi Transparent Logo Preview</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            background-color: #f0f0f0;
            color: white;
        }

        .split {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Checkerboard for testing transparency */
        .rider-bg {
            background-image:
                linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0),
                linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0);
            background-position: 0 0, 20px 20px;
            background-size: 40px 40px;
            background-color: #ffffff;
        }

        .driver-bg {
            background-color: #07050F;
        }

        .driver-glow {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 60%;
            background: radial-gradient(ellipse at top, rgba(124, 58, 237, 0.25) 0%, transparent 70%);
            pointer-events: none;
        }

        .branding {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .rider-tagline {
            font-size: 12px;
            font-weight: 400;
            color: rgba(0, 0, 0, 0.4);
            letter-spacing: 3px;
            margin-top: 16px;
        }

        .driver-tagline {
            font-size: 15px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 2px;
            margin-top: 16px;
        }

        .demo-label {
            position: absolute;
            top: 20px;
            font-size: 14px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .demo-label-light {
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>

    <div class="split rider-bg">
        <div class="demo-label">Transparency Test (No Black Square)</div>
        <div class="branding">
            <img src="file:///Users/kingtay/Desktop/g%20taxi%20rider/apps/rider/assets/images/custom_logo.png"
                style="width: 200px; height: 200px; object-fit: contain; margin-bottom: 0px;">
            <div class="rider-tagline" style="color: black;">PREMIUM TRANSPARENT LOGO</div>
        </div>
    </div>

    <div class="split driver-bg">
        <div class="driver-glow"></div>
        <div class="demo-label demo-label-light">Driver App Mockup</div>
        <div class="branding">
            <img src="file:///Users/kingtay/Desktop/g%20taxi%20rider/apps/driver/assets/images/custom_logo.png"
                style="width: 200px; height: 200px; object-fit: contain; margin-bottom: 0px;">
            <div class="driver-tagline">DRIVER PORTAL</div>
        </div>
    </div>

</body>

</html>
