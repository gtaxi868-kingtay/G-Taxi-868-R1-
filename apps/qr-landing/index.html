<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Taxi - Request Your Ride</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0D0B1E 0%, #160B32 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #7B5CF0 0%, #00E5FF 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(123, 92, 240, 0.3);
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            margin-bottom: 32px;
            text-align: center;
        }
        .location {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(123, 92, 240, 0.3);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            max-width: 340px;
            width: 100%;
        }
        .location-icon {
            font-size: 24px;
        }
        .location-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }
        .location-text strong {
            color: white;
            display: block;
            font-size: 16px;
            margin-bottom: 2px;
        }
        .btn {
            width: 100%;
            max-width: 340px;
            padding: 18px 24px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7B5CF0 0%, #00E5FF 100%);
            color: white;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(123, 92, 240, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(123, 92, 240, 0.5);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
        .loading {
            display: none;
            margin-top: 20px;
            text-align: center;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(123, 92, 240, 0.3);
            border-top-color: #7B5CF0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="logo">G</div>
    <h1>Request Your Ride</h1>
    <p class="subtitle">Fast, safe rides in Trinidad & Tobago</p>
    
    <div class="location" id="locationBox">
        <span class="location-icon">📍</span>
        <div class="location-text">
            <strong id="standName">Loading location...</strong>
            <span id="standAddress">Please allow location access</span>
        </div>
    </div>

    <button class="btn btn-primary" id="requestBtn" onclick="requestRide()">
        <span>🚗</span> Open G-Taxi App
    </button>
    
    <a class="btn btn-secondary" id="whatsappBtn" href="#" onclick="openWhatsAppFallback()">
        <span>💬</span> Request via WhatsApp
    </a>

    <div class="loading" id="loadingState">
        <div class="spinner"></div>
        <p>Opening G-Taxi...</p>
    </div>

    <p class="footer">
        Don't have the app?<br>
        <a href="#" onclick="openAppStore()" style="color: #00E5FF;">Download on App Store</a> or 
        <a href="#" onclick="openPlayStore()" style="color: #00E5FF;">Google Play</a>
    </p>

    <script>
        // Configuration
        const STAND_LOCATIONS = {
            'san-grande': { name: 'San Grande Taxi Stand', lat: 10.65, lng: -61.4 },
            'pos-central': { name: 'Port of Spain Central', lat: 10.65, lng: -61.5167 },
            'arima': { name: 'Arima Taxi Stand', lat: 10.6333, lng: -61.2833 },
            'chaguanas': { name: 'Chaguanas Taxi Stand', lat: 10.5167, lng: -61.4167 },
        };

        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        const standId = urlParams.get('stand') || 'san-grande';
        const stand = STAND_LOCATIONS[standId] || STAND_LOCATIONS['san-grande'];

        // Update UI with stand info
        document.getElementById('standName').textContent = stand.name;
        document.getElementById('standAddress').textContent = 'Taxi Stand · GPS Located';

        // Store location for app deep link
        let userLocation = null;

        // Get user location if permitted
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userLocation = {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude
                    };
                },
                () => {
                    // Location denied, use stand location
                    userLocation = { lat: stand.lat, lng: stand.lng };
                }
            );
        }

        function requestRide() {
            const loading = document.getElementById('loadingState');
            const btn = document.getElementById('requestBtn');
            
            loading.classList.add('show');
            btn.classList.add('hidden');

            // Try to open app with deep link
            const lat = userLocation?.lat || stand.lat;
            const lng = userLocation?.lng || stand.lng;
            const deepLink = `gtaxi://request?lat=${lat}&lng=${lng}&stand=${standId}&source=qr`;
            
            // Try opening the app
            window.location.href = deepLink;

            // Fallback after 2.5 seconds if app not installed
            setTimeout(() => {
                // Show WhatsApp option more prominently
                document.getElementById('whatsappBtn').style.display = 'flex';
                document.getElementById('whatsappBtn').style.background = 'linear-gradient(135deg, #25D366 0%, #128C7E 100%)';
                document.getElementById('whatsappBtn').style.border = 'none';
                loading.classList.remove('show');
                
                // Update text to show fallback happened
                document.querySelector('.subtitle').textContent = 'App not installed? Use WhatsApp instead:';
            }, 2500);
        }

        function openWhatsAppFallback() {
            const lat = userLocation?.lat || stand.lat;
            const lng = userLocation?.lng || stand.lng;
            const message = encodeURIComponent(
                `Hi! I'd like to request a G-Taxi ride from ${stand.name}. ` +
                `My location: https://maps.google.com/?q=${lat},${lng}`
            );
            
            // G-Taxi WhatsApp business number (update with real number)
            const phone = '18681234567'; // Replace with actual G-Taxi WhatsApp number
            const waLink = `https://wa.me/${phone}?text=${message}`;
            
            window.location.href = waLink;
        }

        function openAppStore() {
            window.location.href = 'https://apps.apple.com/app/g-taxi'; // Update with real App Store URL
        }

        function openPlayStore() {
            window.location.href = 'https://play.google.com/store/apps/details?id=com.gtaxi.rider'; // Update with real package name
        }

        // Auto-detect if opened in app
        if (window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches) {
            // Already in PWA mode, redirect to app
            requestRide();
        }
    </script>
</body>
</html>
